services:
  web:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Use the MariaDB service running on the Ubuntu host
      DB_HOST: host.docker.internal
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-job_portal_db}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-StrongPass123}

      # Development defaults (can be overridden in .env)
      DEBUG: ${DEBUG:-True}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-django-insecure-your-secret-key-here}
    ports:
      - "8001:8001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app

